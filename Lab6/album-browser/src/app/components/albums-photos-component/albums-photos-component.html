<ng-template #loading>
    <div id="loadingDiv">
        <p>Loading photos...</p>
    </div>
</ng-template>

<ng-container *ngIf="photos | async as photos; else loading">
    <div id="container">
        <app-photo-card 
        *ngFor = "let photo of photos; trackBy: trackById" [photo] = photo
        ></app-photo-card>
    </div>
    <a [routerLink]="['/albums' , albumId]">Back</a>
</ng-container>
